<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 會議摘要器 | 您的智慧會議助理</title>
  
  <!-- Google Fonts: Outfit & Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <style>
    :root {
      --bg-color: #09090b;
      --card-bg: rgba(20, 20, 25, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent-gradient: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
      --accent-shadow: rgba(168, 85, 247, 0.25);
      --glow-color: rgba(99, 102, 241, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
      padding: 2rem 1rem;
    }

    /* Ambient background glows */
    body::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      bottom: -300px;
      right: -100px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    .container {
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      z-index: 1;
    }

    /* Header styling */
    header {
      text-align: center;
      margin-bottom: 1rem;
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 30%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 300;
    }

    /* Card styling (Glassmorphism) */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .card:focus-within {
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 20px 40px rgba(99, 102, 241, 0.05);
    }

    /* Input area */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    textarea {
      width: 100%;
      height: 250px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.2rem;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    textarea:focus {
      border-color: #a855f7;
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    /* Language selector */
    .language-selector {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }

    .language-option {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1rem;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      text-align: center;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .language-option:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
      transform: translateY(-2px);
    }

    .language-option.active {
      background: rgba(168, 85, 247, 0.1);
      border-color: #a855f7;
      color: #e9d5ff;
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
    }

    .language-option span.icon {
      font-size: 1.5rem;
    }

    /* Action button */
    button.btn-submit {
      background: var(--accent-gradient);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 1.1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      box-shadow: 0 10px 20px var(--accent-shadow);
      position: relative;
      overflow: hidden;
    }

    button.btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(168, 85, 247, 0.4);
      filter: brightness(1.1);
    }

    button.btn-submit:active {
      transform: translateY(1px);
    }

    button.btn-submit:disabled {
      background: #27272a;
      color: #71717a;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Output Card */
    .output-card {
      display: none;
      animation: fadeIn 0.5s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }

    .output-title {
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #a855f7;
    }

    .btn-copy {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-copy:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .markdown-content {
      line-height: 1.8;
      font-size: 1.05rem;
      color: rgba(255, 255, 255, 0.9);
    }

    /* Markdown elements styling */
    .markdown-content h1, 
    .markdown-content h2, 
    .markdown-content h3 {
      font-family: 'Outfit', sans-serif;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: #ffffff;
    }
    
    .markdown-content h2 {
      font-size: 1.4rem;
      border-left: 4px solid #a855f7;
      padding-left: 0.75rem;
    }

    .markdown-content p {
      margin-bottom: 1rem;
    }

    .markdown-content ul, 
    .markdown-content ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }

    .markdown-content li {
      margin-bottom: 0.5rem;
    }

    .markdown-content blockquote {
      border-left: 4px solid rgba(99, 102, 241, 0.5);
      background: rgba(99, 102, 241, 0.05);
      padding: 0.75rem 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .card {
        padding: 1.5rem;
      }
      header h1 {
        font-size: 2.2rem;
      }
      .language-selector {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>✨ Meeting Summarizer</h1>
      <p>貼上會議逐字稿，立即生成結構化的會議紀錄與行動方案</p>
    </header>

    <div class="card">
      <div class="form-group">
        <label for="transcript">
          <span>📝</span> 會議逐字稿
        </label>
        <textarea id="transcript" placeholder="在此貼上您的會議錄音逐字稿（支援長文本）..."></textarea>
      </div>

      <div class="form-group">
        <label><span>🌐</span> 輸出語言 (Output Language)</label>
        <div class="language-selector">
          <div class="language-option active" data-lang="zh-TW">
            <span class="icon">🇹🇼</span>
            <span class="title">繁體中文</span>
          </div>
          <div class="language-option" data-lang="zh-CN">
            <span class="icon">🇨🇳</span>
            <span class="title">简体中文</span>
          </div>
          <div class="language-option" data-lang="en">
            <span class="icon">🇺🇸</span>
            <span class="title">English</span>
          </div>
          <div class="language-option" data-lang="ja">
            <span class="icon">🇯🇵</span>
            <span class="title">日本語</span>
          </div>
        </div>
      </div>

      <button id="btn-submit" class="btn-submit">
        <span>🚀</span> <span id="btn-text">生成結構化會議記錄</span>
        <div id="spinner" class="spinner"></div>
      </button>
    </div>

    <!-- Output Area -->
    <div id="output-card" class="card output-card">
      <div class="output-header">
        <div class="output-title">
          <span>🧠</span> AI 摘要結果
        </div>
        <button id="btn-copy" class="btn-copy">
          <span id="copy-icon">📋</span> <span id="copy-text">複製 Markdown</span>
        </button>
      </div>
      <div id="markdown-result" class="markdown-content"></div>
    </div>
  </div>

  <script>
    // Google Apps Script Web App 網址
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwaOyZhUSr6FUVJotL9vJgZ0IgsH0zby2FBqYmoqQBd_snXBwzpFKIDldG-M8v5rbqihg/exec";

    let selectedLanguage = 'zh-TW';
    let rawSummaryMarkdown = "";

    // 選擇語言
    document.querySelectorAll('.language-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.language-option').forEach(opt => opt.classList.remove('active'));
        option.classList.add('active');
        selectedLanguage = option.getAttribute('data-lang');
      });
    });

    const btnSubmit = document.getElementById('btn-submit');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');
    const transcriptInput = document.getElementById('transcript');
    const outputCard = document.getElementById('output-card');
    const markdownResult = document.getElementById('markdown-result');
    const btnCopy = document.getElementById('btn-copy');

    // 點擊提交按鈕
    btnSubmit.addEventListener('click', async () => {
      const transcript = transcriptInput.value.trim();
      if (!transcript) {
        alert('請先輸入或貼上逐字稿內容！');
        return;
      }

      // 載入狀態
      btnSubmit.disabled = true;
      btnText.textContent = '摘要生成中...';
      spinner.style.display = 'block';
      outputCard.style.display = 'none';

      try {
        const response = await fetch(GAS_WEBAPP_URL, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8' // 使用 text/plain 避免 CORS preflight (OPTIONS) 限制
          },
          body: JSON.stringify({
            transcript: transcript,
            language: selectedLanguage
          })
        });

        const data = await response.json();

        if (data.error) {
          alert('錯誤: ' + data.error);
        } else if (data.success) {
          rawSummaryMarkdown = data.summary;
          // 解析 markdown 並渲染
          markdownResult.innerHTML = marked.parse(rawSummaryMarkdown);
          // 顯示結果卡片
          outputCard.style.display = 'block';
          // 滾動到結果區域
          outputCard.scrollIntoView({ behavior: 'smooth' });
        } else {
          alert('未知的伺服器回應');
        }
      } catch (error) {
        console.error(error);
        alert('發送請求失敗，請確認你的 GAS 端點已正確部署且 API Key 已設定。詳細錯誤：' + error.message);
      } finally {
        // 還原按鈕狀態
        btnSubmit.disabled = false;
        btnText.textContent = '生成結構化會議記錄';
        spinner.style.display = 'none';
      }
    });

    // 複製按鈕
    btnCopy.addEventListener('click', () => {
      if (!rawSummaryMarkdown) return;
      
      navigator.clipboard.writeText(rawSummaryMarkdown).then(() => {
        const copyText = document.getElementById('copy-text');
        const copyIcon = document.getElementById('copy-icon');
        
        copyText.textContent = '已複製！';
        copyIcon.textContent = '✅';
        
        setTimeout(() => {
          copyText.textContent = '複製 Markdown';
          copyIcon.textContent = '📋';
        }, 2000);
      }).catch(err => {
        console.error('複製失敗: ', err);
        alert('無法複製到剪貼簿');
      });
    });
  </script>
</body>
</html>
