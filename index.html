<!DOCTYPE html>
<!-- Build Trigger v1.2 -->
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 會議摘要器 | 您的智慧會議助理</title>
  
  <!-- Google Fonts: Outfit & Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- html2pdf.js for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    :root {
      --bg-color: #09090b;
      --card-bg: rgba(20, 20, 25, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent-gradient: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
      --accent-shadow: rgba(168, 85, 247, 0.25);
      --glow-color: rgba(99, 102, 241, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
      padding: 2rem 1rem;
    }

    /* Ambient background glows */
    body::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      bottom: -300px;
      right: -100px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    .container {
      max-width: 1200px; /* 增加寬度以支援左右佈局 */
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      z-index: 1;
    }

    /* Header styling */
    header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 30%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 300;
    }

    /* 左右欄位佈局 */
    .app-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 2rem;
      width: 100%;
      align-items: start;
    }

    /* Card styling (Glassmorphism) */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .card:focus-within {
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 20px 40px rgba(99, 102, 241, 0.05);
    }

    /* 歷史紀錄卡片 */
    .history-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 700px;
      overflow-y: auto;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 0.75rem;
    }

    .history-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #a855f7;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-clear-all {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
      transition: color 0.25s ease;
    }

    .btn-clear-all:hover {
      color: #f87171;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .history-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(168, 85, 247, 0.3);
      transform: translateY(-1px);
    }

    .history-item.active {
      background: rgba(168, 85, 247, 0.08);
      border-color: #a855f7;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.05);
    }

    .history-item-content {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      width: calc(100% - 28px);
    }

    .history-item-time {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .history-item-snippet {
      font-size: 0.85rem;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-delete-history {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-delete-history:hover {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }

    .empty-history {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      padding: 2rem 0;
      font-style: italic;
    }

    /* Input area */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    textarea {
      width: 100%;
      height: 250px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.2rem;
      padding-bottom: 2.2rem; /* 留出空間給字數指示器 */
      color: var(--text-main);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    textarea:focus {
      border-color: #a855f7;
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    /* Language selector */
    .language-selector {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }

    .language-option {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1rem;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      text-align: center;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .language-option:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
      transform: translateY(-2px);
    }

    .language-option.active {
      background: rgba(168, 85, 247, 0.1);
      border-color: #a855f7;
      color: #e9d5ff;
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
    }

    .language-option span.icon {
      font-size: 1.5rem;
    }

    /* Action button */
    button.btn-submit {
      background: var(--accent-gradient);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 1.1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      box-shadow: 0 10px 20px var(--accent-shadow);
      position: relative;
      overflow: hidden;
    }

    button.btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(168, 85, 247, 0.4);
      filter: brightness(1.1);
    }

    button.btn-submit:active {
      transform: translateY(1px);
    }

    button.btn-submit:disabled {
      background: #27272a;
      color: #71717a;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Output Card */
    .output-card {
      display: none;
      animation: fadeIn 0.5s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .output-title {
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #a855f7;
    }

    .action-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn-action {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 0.5rem 0.85rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-action:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .btn-action:active {
      transform: translateY(0);
    }

    .markdown-content {
      line-height: 1.8;
      font-size: 1.05rem;
      color: rgba(255, 255, 255, 0.9);
    }

    /* Markdown elements styling */
    .markdown-content h1, 
    .markdown-content h2, 
    .markdown-content h3 {
      font-family: 'Outfit', sans-serif;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: #ffffff;
    }
    
    .markdown-content h2 {
      font-size: 1.4rem;
      border-left: 4px solid #a855f7;
      padding-left: 0.75rem;
    }

    .markdown-content p {
      margin-bottom: 1rem;
    }

    .markdown-content ul, 
    .markdown-content ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }

    .markdown-content li {
      margin-bottom: 0.5rem;
    }

    .markdown-content blockquote {
      border-left: 4px solid rgba(99, 102, 241, 0.5);
      background: rgba(99, 102, 241, 0.05);
      padding: 0.75rem 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-style: italic;
    }

    /* Scrollbar Styling for History */
    .history-card::-webkit-scrollbar {
      width: 6px;
    }
    .history-card::-webkit-scrollbar-track {
      background: transparent;
    }
    .history-card::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    .history-card::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Responsive */
    @media (max-width: 992px) {
      .app-layout {
        grid-template-columns: 1fr;
      }
      .history-card {
        max-height: 300px;
      }
      .card {
        padding: 1.5rem;
      }
      header h1 {
        font-size: 2.2rem;
      }
      .language-selector {
        grid-template-columns: repeat(2, 1fr);
      }
      .output-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .action-group {
        width: 100%;
      }
      .btn-action {
        flex-grow: 1;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>✨ Meeting Summarizer</h1>
      <p>貼上會議逐字稿，立即生成結構化的會議紀錄與行動方案</p>
    </header>

    <div class="app-layout">
      <!-- Left side: History Logs Panel -->
      <div class="history-card">
        <div class="history-header">
          <div class="history-title">
            <span>📜</span> 歷史紀錄
          </div>
          <button id="btn-clear-all" class="btn-clear-all">清除全部</button>
        </div>
        <div id="history-list" class="history-list">
          <div class="empty-history">載入中...</div>
        </div>
      </div>

      <!-- Right side: Input and Output Panels -->
      <div style="display: flex; flex-direction: column; gap: 2rem; width: 100%;">
        <div class="card">
          <div class="form-group" style="position: relative;">
            <label for="transcript">
              <span>📝</span> 會議逐字稿
            </label>
            <div style="position: relative; width: 100%;">
              <textarea id="transcript" placeholder="在此貼上您的會議錄音逐字稿（支援長文本）..."></textarea>
              <div id="char-counter" style="position: absolute; bottom: 12px; right: 12px; font-size: 0.8rem; color: var(--text-muted); background: rgba(0, 0, 0, 0.6); padding: 3px 8px; border-radius: 6px; pointer-events: none; backdrop-filter: blur(4px); border: 1px solid var(--card-border);">0 / 17,000 字</div>
            </div>
            <div id="warning-banner" style="display: none; color: #f87171; font-size: 0.85rem; font-weight: 600; margin-top: -0.25rem; animation: fadeIn 0.3s ease;">⚠️ 逐字稿字數已超過 17,000 字，可能影響生成品質或超出 AI 處理上限！</div>
          </div>

          <div class="form-group">
            <label><span>🌐</span> 輸出語言 (Output Language)</label>
            <div class="language-selector">
              <div class="language-option active" data-lang="zh-TW">
                <span class="icon">🇹🇼</span>
                <span class="title">繁體中文</span>
              </div>
              <div class="language-option" data-lang="zh-CN">
                <span class="icon">🇨🇳</span>
                <span class="title">简体中文</span>
              </div>
              <div class="language-option" data-lang="en">
                <span class="icon">🇺🇸</span>
                <span class="title">English</span>
              </div>
              <div class="language-option" data-lang="ja">
                <span class="icon">🇯🇵</span>
                <span class="title">日本語</span>
              </div>
            </div>
          </div>

          <button id="btn-submit" class="btn-submit">
            <span>🚀</span> <span id="btn-text">生成結構化會議記錄</span>
            <div id="spinner" class="spinner"></div>
          </button>
        </div>

        <!-- Output Area -->
        <div id="output-card" class="card output-card">
          <div class="output-header">
            <div class="output-title">
              <span>🧠</span> AI 摘要結果
            </div>
            <div class="action-group">
              <button id="btn-copy" class="btn-action">
                <span id="copy-icon">📋</span> <span id="copy-text">複製</span>
              </button>
              <button id="btn-dl-md" class="btn-action" style="border-color: rgba(99, 102, 241, 0.4); color: #c084fc;">
                <span>📄</span> <span>Markdown</span>
              </button>
              <button id="btn-dl-word" class="btn-action" style="border-color: rgba(59, 130, 246, 0.4); color: #60a5fa;">
                <span>📘</span> <span>Word</span>
              </button>
              <button id="btn-dl-pdf" class="btn-action" style="border-color: rgba(239, 68, 68, 0.4); color: #f87171;">
                <span>📕</span> <span>PDF</span>
              </button>
            </div>
          </div>
          <div id="markdown-result" class="markdown-content"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Google Apps Script Web App 網址
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwaOyZhUSr6FUVJotL9vJgZ0IgsH0zby2FBqYmoqQBd_snXBwzpFKIDldG-M8v5rbqihg/exec";

    let selectedLanguage = 'zh-TW';
    let rawSummaryMarkdown = "";
    let historyRecords = [];

    // 初始化頁面
    window.addEventListener('DOMContentLoaded', () => {
      loadHistoryFromStorage();
      updateCharCount();
    });

    // 選擇語言
    document.querySelectorAll('.language-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.language-option').forEach(opt => opt.classList.remove('active'));
        option.classList.add('active');
        selectedLanguage = option.getAttribute('data-lang');
      });
    });

    const btnSubmit = document.getElementById('btn-submit');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');
    const transcriptInput = document.getElementById('transcript');
    const outputCard = document.getElementById('output-card');
    const markdownResult = document.getElementById('markdown-result');
    const btnCopy = document.getElementById('btn-copy');
    const charCounter = document.getElementById('char-counter');
    const warningBanner = document.getElementById('warning-banner');

    // 即時字數統計與警告監聽
    function updateCharCount() {
      const count = transcriptInput.value.length;
      charCounter.textContent = `${count.toLocaleString()} / 17,000 字`;
      
      if (count > 17000) {
        charCounter.style.color = '#f87171'; // 紅色
        charCounter.style.borderColor = 'rgba(248, 113, 113, 0.4)';
        warningBanner.style.display = 'block';
      } else {
        charCounter.style.color = 'var(--text-muted)';
        charCounter.style.borderColor = 'var(--card-border)';
        warningBanner.style.display = 'none';
      }
    }

    transcriptInput.addEventListener('input', updateCharCount);
    transcriptInput.addEventListener('paste', () => {
      // 稍微延遲讓貼上內容完全載入後再進行統計
      setTimeout(updateCharCount, 50);
    });

    // 點擊提交按鈕
    btnSubmit.addEventListener('click', async () => {
      const transcript = transcriptInput.value.trim();
      if (!transcript) {
        alert('請先輸入或貼上逐字稿內容！');
        return;
      }

      // 如果超過 17000 字，跳出提示警告確認
      if (transcript.length > 17000) {
        const proceed = confirm('⚠️ 您的字數已超過 17,000 字限制，這可能會超出 API 單次處理上限或導致內容被截斷。是否仍要繼續發送？');
        if (!proceed) return;
      }

      // 載入狀態
      btnSubmit.disabled = true;
      btnText.textContent = '摘要生成中...';
      spinner.style.display = 'block';
      outputCard.style.display = 'none';

      try {
        const response = await fetch(GAS_WEBAPP_URL, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8' // 使用 text/plain 避免 CORS preflight (OPTIONS) 限制
          },
          body: JSON.stringify({
            transcript: transcript,
            language: selectedLanguage
          })
        });

        const data = await response.json();

        if (data.error) {
          alert('錯誤: ' + data.error);
        } else if (data.success) {
          rawSummaryMarkdown = data.summary;
          // 解析 markdown 並渲染
          markdownResult.innerHTML = marked.parse(rawSummaryMarkdown);
          // 顯示結果卡片
          outputCard.style.display = 'block';
          // 滾動到結果區域
          outputCard.scrollIntoView({ behavior: 'smooth' });

          // 成功後，儲存至歷史紀錄中
          addHistoryRecord(transcript, rawSummaryMarkdown, selectedLanguage);
        } else {
          alert('未知的伺服器回應');
        }
      } catch (error) {
        console.error(error);
        alert('發送請求失敗，請確認你的 GAS 端點已正確部署且 API Key 已設定。詳細錯誤：' + error.message);
      } finally {
        // 還原按鈕狀態
        btnSubmit.disabled = false;
        btnText.textContent = '生成結構化會議記錄';
        spinner.style.display = 'none';
      }
    });

    // 複製按鈕
    btnCopy.addEventListener('click', () => {
      if (!rawSummaryMarkdown) return;
      
      navigator.clipboard.writeText(rawSummaryMarkdown).then(() => {
        const copyText = document.getElementById('copy-text');
        const copyIcon = document.getElementById('copy-icon');
        
        copyText.textContent = '已複製！';
        copyIcon.textContent = '✅';
        
        setTimeout(() => {
          copyText.textContent = '複製';
          copyIcon.textContent = '📋';
        }, 2000);
      }).catch(err => {
        console.error('複製失敗: ', err);
        alert('無法複製到剪貼簿');
      });
    });

    // 下載為 Markdown 檔案
    document.getElementById('btn-dl-md').addEventListener('click', () => {
      if (!rawSummaryMarkdown) return;
      const blob = new Blob([rawSummaryMarkdown], { type: 'text/markdown;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', `會議記錄_${new Date().toISOString().slice(0, 10)}.md`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    // 下載為 Word 檔案 (.doc)
    document.getElementById('btn-dl-word').addEventListener('click', () => {
      if (!rawSummaryMarkdown) return;
      const htmlContent = document.getElementById('markdown-result').innerHTML;
      const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' " +
                     "xmlns:w='urn:schemas-microsoft-com:office:word' " +
                     "xmlns='http://www.w3.org/TR/REC-html40'>" +
                     "<head><meta charset='utf-8'><title>Export Meeting Summary</title>" +
                     "<style>" +
                     "body { font-family: 'Microsoft JhengHei', sans-serif; line-height: 1.6; padding: 20px; }" +
                     "h2 { color: #2563eb; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 20px; font-size: 16pt; }" +
                     "p, li { font-size: 11pt; color: #333333; }" +
                     "ul, ol { padding-left: 20px; }" +
                     "li { margin-bottom: 5px; }" +
                     "</style></head><body>";
      const footer = "</body></html>";
      const sourceHTML = header + htmlContent + footer;
      
      // 使用 \ufeff 加入 BOM 防止 MS Word 開啟時中文亂碼
      const blob = new Blob(['\ufeff' + sourceHTML], { type: 'application/msword;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', `會議記錄_${new Date().toISOString().slice(0, 10)}.doc`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    // 下載為 PDF 檔案
    document.getElementById('btn-dl-pdf').addEventListener('click', () => {
      if (!rawSummaryMarkdown) return;
      
      // 複製節點以建立一個列印友善（白底黑字）的 PDF 內容
      const element = document.getElementById('markdown-result');
      const optElement = element.cloneNode(true);
      
      // 設定列印用樣式
      optElement.style.color = '#111827';
      optElement.style.backgroundColor = '#ffffff';
      optElement.style.padding = '30px';
      optElement.style.fontFamily = "'Microsoft JhengHei', 'Helvetica Neue', Arial, sans-serif";
      
      // 修改 PDF 內的元素顏色，使其有良好的閱讀對比
      optElement.querySelectorAll('h2').forEach(h2 => {
        h2.style.color = '#1d4ed8'; // 藍色主題標題
        h2.style.borderLeft = '5px solid #2563eb';
        h2.style.paddingLeft = '10px';
        h2.style.marginTop = '25px';
        h2.style.marginBottom = '10px';
      });
      optElement.querySelectorAll('p, li').forEach(el => {
        el.style.color = '#374151';
        el.style.fontSize = '12px';
      });
      optElement.querySelectorAll('ul, ol').forEach(el => {
        el.style.paddingLeft = '20px';
      });
      optElement.querySelectorAll('li').forEach(el => {
        el.style.marginBottom = '5px';
      });

      const opt = {
        margin:       15,
        filename:     `會議記錄_${new Date().toISOString().slice(0, 10)}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      
      // 呼叫 html2pdf 進行列印並下載
      html2pdf().from(optElement).set(opt).save();
    });

    // ==========================================
    // 歷史紀錄處理邏輯 (localStorage)
    // ==========================================

    // 載入歷史紀錄
    function loadHistoryFromStorage() {
      const stored = localStorage.getItem('meeting_summary_history');
      if (stored) {
        try {
          historyRecords = JSON.parse(stored);
        } catch (e) {
          historyRecords = [];
        }
      }
      renderHistoryList();
    }

    // 儲存歷史紀錄並重新渲染
    function saveHistoryToStorage() {
      localStorage.setItem('meeting_summary_history', JSON.stringify(historyRecords));
      renderHistoryList();
    }

    // 新增歷史紀錄
    function addHistoryRecord(transcript, summary, language) {
      const newRecord = {
        id: Date.now(),
        timeString: formatDateTime(new Date()),
        titleSnippet: transcript.substring(0, 25).replace(/\n/g, ' ') + (transcript.length > 25 ? '...' : ''),
        transcript: transcript,
        summary: summary,
        language: language
      };

      // 避免儲存完全重複的內容，移除同內容之舊紀錄
      historyRecords = historyRecords.filter(r => !(r.transcript === transcript && r.language === language));

      // 插入到數組開頭
      historyRecords.unshift(newRecord);

      // 限制最多 10 筆
      if (historyRecords.length > 10) {
        historyRecords.pop();
      }

      saveHistoryToStorage();
    }

    // 格式化日期為 YYYY/MM/DD HH:MM
    function formatDateTime(date) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    // 渲染歷史列表 UI
    function renderHistoryList() {
      const listEl = document.getElementById('history-list');
      listEl.innerHTML = '';

      if (historyRecords.length === 0) {
        listEl.innerHTML = '<div class="empty-history">尚無歷史紀錄</div>';
        return;
      }

      historyRecords.forEach(record => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.dataset.id = record.id;
        
        // 點擊歷史條目進行加載
        item.addEventListener('click', (e) => {
          if (e.target.closest('.btn-delete-history')) return; // 點擊刪除不觸發加載
          loadRecord(record);
        });

        const content = document.createElement('div');
        content.className = 'history-item-content';

        const time = document.createElement('div');
        time.className = 'history-item-time';
        
        let langLabel = '繁中';
        if (record.language === 'zh-CN') langLabel = '简中';
        if (record.language === 'en') langLabel = 'EN';
        if (record.language === 'ja') langLabel = 'JA';
        
        time.textContent = `${record.timeString} [${langLabel}]`;

        const snippet = document.createElement('div');
        snippet.className = 'history-item-snippet';
        snippet.textContent = record.titleSnippet;

        content.appendChild(time);
        content.appendChild(snippet);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn-delete-history';
        deleteBtn.innerHTML = '🗑️';
        deleteBtn.title = '刪除此紀錄';
        deleteBtn.addEventListener('click', () => {
          deleteRecord(record.id);
        });

        item.appendChild(content);
        item.appendChild(deleteBtn);
        listEl.appendChild(item);
      });
    }

    // 加載選定的歷史紀錄到畫面上
    function loadRecord(record) {
      transcriptInput.value = record.transcript;
      updateCharCount();

      selectedLanguage = record.language;
      document.querySelectorAll('.language-option').forEach(opt => {
        if (opt.getAttribute('data-lang') === selectedLanguage) {
          opt.classList.add('active');
        } else {
          opt.classList.remove('active');
        }
      });

      rawSummaryMarkdown = record.summary;
      markdownResult.innerHTML = marked.parse(rawSummaryMarkdown);
      outputCard.style.display = 'block';
      outputCard.scrollIntoView({ behavior: 'smooth' });

      // 將目前被點選的項目加上 active 標記
      document.querySelectorAll('.history-item').forEach(item => {
        if (Number(item.dataset.id) === record.id) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }

    // 刪除歷史紀錄
    function deleteRecord(id) {
      historyRecords = historyRecords.filter(r => r.id !== id);
      saveHistoryToStorage();
    }

    // 清除所有歷史紀錄
    document.getElementById('btn-clear-all').addEventListener('click', () => {
      if (confirm('確定要清除所有歷史紀錄嗎？')) {
        historyRecords = [];
        saveHistoryToStorage();
        outputCard.style.display = 'none';
        transcriptInput.value = '';
        updateCharCount();
      }
    });
  </script>
</body>
</html>
